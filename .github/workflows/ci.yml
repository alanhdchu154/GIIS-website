name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --watchAll=false
      - run: npm run build

  server-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: giis
          POSTGRES_PASSWORD: giis_dev
          POSTGRES_DB: giis_transcript
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U giis -d giis_transcript"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://giis:giis_dev@localhost:5432/giis_transcript?schema=public
      JWT_SECRET: ci_jwt_secret_for_giis_12345
      CORS_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        working-directory: server
      - run: npm run db:push
        working-directory: server
      - run: npm run db:seed
        working-directory: server
      - run: npm test -- --runInBand
        working-directory: server
      - run: npm run smoke:student-lifecycle
        working-directory: server
